name: 🚀 Deploy n8n to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-n8n:
    name: 📦 Build & Deploy n8n
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔐 Create .env from GitHub Secrets
        run: |
          cat << 'ENVFILE' > .env
          N8N_ENCRYPTION_KEY=${{ secrets.N8N_ENCRYPTION_KEY }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          N8N_PROTOCOL=https
          N8N_HOST=n8n-location.dibodev.fr
          N8N_EDITOR_BASE_URL=https://n8n-location.dibodev.fr
          N8N_API_BASE_URL=https://n8n-location.dibodev.fr
          ENVFILE

      - name: 📤 Sync project files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,docker-entrypoint.sh,workflows/,.env"
          target: /var/www/n8n-location.dibodev.fr/html
          overwrite: true

      - name: 🐳 Deploy n8n with Docker Compose
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /var/www/n8n-location.dibodev.fr/html

            # Installer Docker si nécessaire
            if ! command -v docker &> /dev/null; then
              echo "Docker non installé, installation..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER || true
            fi

            # Vérifier docker compose (plugin)
            if ! docker compose version &> /dev/null; then
              echo "⚠️ docker compose (plugin) non disponible. Vérifie l'installation Docker si ça échoue."
            fi

            # .env est créé par la CI à partir des secrets GitHub puis synchronisé ci-dessus

            # Mettre à jour l'image et redémarrer n8n
            docker compose pull n8n || true
            docker compose up -d n8n

            docker compose ps

            # Ré-importer le workflow depuis le JSON (met à jour le workflow en prod à chaque deploy)
            echo "Import du workflow depuis workflows/recherche_appart_rennes.json..."
            sleep 5
            docker compose exec -T n8n n8n import:workflow --input=/workflows/recherche_appart_rennes.json
