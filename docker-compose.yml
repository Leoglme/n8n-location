version: "3.9"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-location
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      # Sécurité basique pour l'UI n8n
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=change_me

      # Configuration serveur (override via .env en prod pour OAuth / URL publique)
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      - N8N_API_BASE_URL=${N8N_API_BASE_URL:-http://localhost:5678}

      # Timezone (pour les Cron)
      - GENERIC_TIMEZONE=Europe/Paris

      # Autorise {{ $env.VAR }} dans les nodes si besoin
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false

      # Clé d'encryption (valeur depuis .env : N8N_ENCRYPTION_KEY)
      # Injection des credentials depuis .env :
      # - Groq : HTTP Header Auth (node "Groq - Générer message")
      # - Telegram : Access Token du credential "Telegram account" (TELEGRAM_BOT_TOKEN)
      # - Google Sheets : Client ID / Client Secret OAuth2
      - "CREDENTIALS_OVERWRITE_DATA={\"httpHeaderAuth\":{\"name\":\"Authorization\",\"value\":\"Bearer ${GROQ_API_KEY}\"},\"telegramApi\":{\"accessToken\":\"${TELEGRAM_BOT_TOKEN}\"},\"googleSheetsOAuth2Api\":{\"clientId\":\"${GOOGLE_OAUTH_CLIENT_ID}\",\"clientSecret\":\"${GOOGLE_OAUTH_CLIENT_SECRET}\"}}"

    volumes:
      # Persistance (volume Docker nommé : workflows, credentials, exécutions)
      - n8n_data:/home/node/.n8n
      # Workflow(s) à importer automatiquement au premier démarrage
      - ./workflows:/workflows:ro
      # Script d'entrée pour import auto au premier lancement
      - ./docker-entrypoint.sh:/docker-entrypoint.sh:ro

    entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]

    # Optionnel : si tu veux fixer l'UID/GID
    # user: "1000:1000"

volumes:
  n8n_data:

networks:
  default:
    name: n8n-location-network
